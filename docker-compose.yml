services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: fintrack
      POSTGRES_USER: fintrack
      POSTGRES_PASSWORD: fintrack
      TZ: America/Fortaleza
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintrack -d fintrack"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql+psycopg://fintrack:fintrack@db:5432/fintrack
      DATABASE_ECHO: "false"
      SECRET_KEY: dev-secret-change-me
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      DEFAULT_USER_ID: "1"
      DEFAULT_MONTHLY_INCOME: "3000"
      TIMEZONE: America/Fortaleza
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  ngrok:
    image: ngrok/ngrok:latest
    command:
      - http
      - --config=/etc/ngrok.yml
      - --url=${NGROK_DOMAIN:-obsolete-glare-reckless.ngrok-free.dev}
      - backend:8000
    depends_on:
      - backend
    ports:
      - "4040:4040"
    volumes:
      - ${NGROK_CONFIG:-/home/josuelemoos/.config/ngrok/ngrok.yml}:/etc/ngrok.yml:ro
    restart: unless-stopped

volumes:
  postgres_data:
